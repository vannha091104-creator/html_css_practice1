<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="header.css" />
  <title>Booklett</title>
</head>
<body>
  <!-- Top banner -->
  <div class="top-banner">
    <p>
      Get a 80% off on Purchase Rs 2000
      <a href="#">Shop Now <span>→</span></a>
    </p>
  </div>

  <!-- Header -->
  <header class="header">
    <div class="logo">
      <img src="img/book.png" alt="Booklett logo" />
      <span>Bookleft</span>
    </div>

    <nav class="nav">
      <a href="#" class="active">Home</a>
      <a href="#" class="nav-item">Category <img src="img/dropdown.png" alt="dropdown" /></a>
      <a href="#" class="nav-item">New Arrivals</a>
      <a href="#" class="nav-item">Best Selling Books</a>
      <a href="#" class="nav-item">Deal of The Day</a>
      <a href="#" class="nav-item">Contact Us</a>
    </nav>

    <div class="actions">
      <button class="icon-btn">
        <img src="img/cart.png" alt="cart" />
      </button>
      <button class="icon-btn heart-btn">
        <img src="img/tim.png" alt="wishlist" />
      </button>
      <button class="signin">
        Sign In
        <img src="img/user.png" alt="user" />
      </button>
    </div>
  </header>

  <!-- Hero -->
  <section class="hero">
    <div class="hero-container">
      <div class="hero-left">
        <img class="girl" src="img/girl.png" alt="girl reading book" />
        <img class="clivebook" src="img/clivebook.png" alt="book cover" />
      </div>

      <div class="hero-right">
        <h1>Clive<br />Cussler</h1>
        <p>And Boyd Morrison</p>

        <div class="hero-buttons">
          <button class="btn-more">More Info</button>
          <button class="btn-buynow">
            Buy Now
            <img src="img/buynow.png" alt="buynow" />
          </button>
        </div>
      </div>
    </div>
  </section>
</body>
</html>
